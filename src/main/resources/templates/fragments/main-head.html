<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" th:fragment="head">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">Trà Thơm</title>
    <!-- Tailwind CSS CDN with Plugins -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <!-- Google Fonts: Inter for UI and a handwritten style for logo -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'sage-green': '#9CAF88',
                        'light-mint': '#E8F3E9',
                        'creamy-white': '#FDFCF8',
                        'earthy-brown': '#6B5E4C',
                        "primary": "#ec5b13",
                        "background-light": "#f8f6f6",
                        "background-dark": "#221610",
                        "sage": "#9db4a0",
                        "mint": "#e8f3ee",
                        "earth": "#7c6a5a"
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        handwritten: ['Dancing Script', 'cursive'],
                    }
                }
            }
        }
    </script>
    <style data-purpose="custom-layout-styles">
        /* Custom scroll behavior */
        html {
            scroll-behavior: smooth;
        }
        /* Subtle zoom effect for product cards */
        .product-card:hover img {
            transform: scale(1.05);
        }
        /* Ensure the hero section is full height or large enough */
        .hero-section {
            min-height: 80vh;
        }
    </style>
</head>
</html>
