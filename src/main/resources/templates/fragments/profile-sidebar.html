<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" th:fragment="sidebar">
<aside class="w-full lg:w-1/4">
    <div class="bg-surface dark:bg-slate-900 rounded-xl overflow-hidden shadow-sm border border-primary/5">
        <nav class="flex flex-col">
            <a th:href="@{/profile}" 
               th:classappend="${activePage == 'profile'} ? 'sidebar-active flex items-center gap-3 px-6 py-4 transition-colors font-medium' : 'flex items-center gap-3 px-6 py-4 text-slate-600 dark:text-slate-300 hover:bg-primary/5 hover:text-primary transition-colors font-medium'">
                <span class="material-symbols-outlined">person</span>
                <span>Thông tin cá nhân</span>
            </a>
            <a th:href="@{/profile/address}"
               th:classappend="${activePage == 'address'} ? 'sidebar-active flex items-center gap-3 px-6 py-4 transition-colors font-medium' : 'flex items-center gap-3 px-6 py-4 text-slate-600 dark:text-slate-300 hover:bg-primary/5 hover:text-primary transition-colors font-medium'">
                <span class="material-symbols-outlined">location_on</span>
                <span>Địa chỉ giao hàng</span>
            </a>
            <a th:href="@{/profile/orders}"
               th:classappend="${activePage == 'orders'} ? 'sidebar-active flex items-center gap-3 px-6 py-4 transition-colors font-medium' : 'flex items-center gap-3 px-6 py-4 text-slate-600 dark:text-slate-300 hover:bg-primary/5 hover:text-primary transition-colors font-medium'">
                <span class="material-symbols-outlined">shopping_bag</span>
                <span>Lịch sử đơn hàng</span>
            </a>
            <a th:href="@{/profile/password}"
               th:classappend="${activePage == 'password'} ? 'sidebar-active flex items-center gap-3 px-6 py-4 transition-colors font-medium border-t border-primary/5 mt-4' : 'flex items-center gap-3 px-6 py-4 text-slate-600 dark:text-slate-300 hover:bg-primary/5 hover:text-primary transition-colors font-medium border-t border-primary/5 mt-4'">
                <span class="material-symbols-outlined">lock</span>
                <span>Đổi mật khẩu</span>
            </a>
            <a th:href="@{/logout}" class="flex items-center gap-3 px-6 py-4 text-red-500 hover:bg-red-50 dark:hover:bg-red-900/10 transition-colors font-medium">
                <span class="material-symbols-outlined">logout</span>
                <span>Đăng xuất</span>
            </a>
        </nav>
    </div>
    
    <div class="mt-6 p-6 rounded-xl bg-primary/5 border border-primary/10 relative overflow-hidden group">
        <div class="relative z-10">
            <h4 class="font-bold text-primary mb-1">Ưu đãi hôm nay</h4>
            <p class="text-sm text-slate-600 dark:text-slate-400">Giảm 20% cho đơn trà Oolong đầu tiên.</p>
            <button class="mt-3 text-sm font-bold text-primary flex items-center gap-1 group-hover:gap-2 transition-all">
                Xem ngay <span class="material-symbols-outlined text-sm">arrow_forward</span>
            </button>
        </div>
        <span class="material-symbols-outlined absolute -bottom-4 -right-4 text-8xl text-primary/5 transform -rotate-12">local_florist</span>
    </div>
</aside>
</html>
