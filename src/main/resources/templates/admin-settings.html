<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" th:replace="~{layouts/admin-layout :: layout('Trà Thơm Admin - Cài đặt', 'settings', ~{::div.content-wrapper})}">
<body>
    <div class="content-wrapper p-8">
        <div class="flex items-center justify-between mb-8">
            <div>
                <h2 class="text-2xl font-bold">Cài đặt hệ thống</h2>
                <p class="text-slate-500">Quản lý cấu hình cửa hàng và website</p>
            </div>
            <button class="bg-primary text-white px-8 py-2.5 rounded-xl font-semibold hover:bg-primary/90 transition-all shadow-lg shadow-primary/20">
                Lưu cài đặt
            </button>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-2 space-y-6">
                <div class="bg-white dark:bg-slate-900 p-6 rounded-2xl shadow-sm border border-slate-100 dark:border-slate-800">
                    <h4 class="font-bold text-lg mb-4">Thông tin chung</h4>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Tên cửa hàng</label>
                            <input type="text" value="Trà Thơm" class="w-full px-4 py-2 border border-slate-200 dark:border-slate-700 rounded-xl focus:ring-2 focus:ring-primary/20 outline-none">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Địa chỉ Email liên hệ</label>
                            <input type="email" value="contact@trathom.vn" class="w-full px-4 py-2 border border-slate-200 dark:border-slate-700 rounded-xl focus:ring-2 focus:ring-primary/20 outline-none">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Số điện thoại</label>
                            <input type="text" value="0987 654 321" class="w-full px-4 py-2 border border-slate-200 dark:border-slate-700 rounded-xl focus:ring-2 focus:ring-primary/20 outline-none">
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="space-y-6">
                <div class="bg-white dark:bg-slate-900 p-6 rounded-2xl shadow-sm border border-slate-100 dark:border-slate-800">
                    <h4 class="font-bold text-lg mb-4">Trạng thái website</h4>
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="font-medium text-sm">Chế độ bảo trì</p>
                            <p class="text-xs text-slate-500">Tạm thời ngừng truy cập website</p>
                        </div>
                        <div class="relative inline-flex items-center cursor-pointer">
                            <div class="w-11 h-6 bg-slate-200 rounded-full"></div>
                            <div class="absolute left-1 top-1 bg-white w-4 h-4 rounded-full transition-transform"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
