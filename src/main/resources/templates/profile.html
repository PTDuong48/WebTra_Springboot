<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" th:replace="~{layouts/profile-layout :: layout('Hồ sơ thành viên - Trà Thơm', 'profile', ~{::div.content-wrapper})}">
<body>
    <div class="content-wrapper">
        <div class="bg-surface dark:bg-slate-900 rounded-xl shadow-sm border border-primary/5 p-8 text-slate-900 dark:text-slate-100">
            <div class="flex items-center gap-2 mb-8 pb-4 border-b border-primary/5">
                <h2 class="text-xl font-bold">Thông tin cá nhân</h2>
            </div>
            <form class="space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <!-- Họ và tên -->
                    <div class="flex flex-col gap-2">
                        <label class="text-sm font-semibold text-slate-700 dark:text-slate-300">Họ và tên</label>
                        <input type="text" value="Nguyễn Văn A" class="w-full px-4 py-3 rounded-xl border border-primary/10 bg-background-light/50 dark:bg-slate-800 focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none" placeholder="Nhập họ và tên">
                    </div>
                    <!-- Số điện thoại -->
                    <div class="flex flex-col gap-2">
                        <label class="text-sm font-semibold text-slate-700 dark:text-slate-300">Số điện thoại</label>
                        <input type="tel" value="0901 234 567" class="w-full px-4 py-3 rounded-xl border border-primary/10 bg-background-light/50 dark:bg-slate-800 focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none" placeholder="0xxx xxx xxx">
                    </div>
                    <!-- Ngày sinh -->
                    <div class="flex flex-col gap-2">
                        <label class="text-sm font-semibold text-slate-700 dark:text-slate-300">Ngày sinh</label>
                        <input type="date" value="1995-06-15" class="w-full px-4 py-3 rounded-xl border border-primary/10 bg-background-light/50 dark:bg-slate-800 focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none">
                    </div>
                    <!-- Giới tính -->
                    <div class="flex flex-col gap-2">
                        <label class="text-sm font-semibold text-slate-700 dark:text-slate-300">Giới tính</label>
                        <div class="flex items-center gap-6 h-[50px]">
                            <label class="flex items-center gap-2 cursor-pointer group">
                                <input type="radio" name="gender" class="w-4 h-4 text-primary focus:ring-primary border-primary/20 cursor-pointer" checked="">
                                <span class="text-slate-600 dark:text-slate-300 group-hover:text-primary transition-colors">Nam</span>
                            </label>
                            <label class="flex items-center gap-2 cursor-pointer group">
                                <input type="radio" name="gender" class="w-4 h-4 text-primary focus:ring-primary border-primary/20 cursor-pointer">
                                <span class="text-slate-600 dark:text-slate-300 group-hover:text-primary transition-colors">Nữ</span>
                            </label>
                            <label class="flex items-center gap-2 cursor-pointer group">
                                <input type="radio" name="gender" class="w-4 h-4 text-primary focus:ring-primary border-primary/20 cursor-pointer">
                                <span class="text-slate-600 dark:text-slate-300 group-hover:text-primary transition-colors">Khác</span>
                            </label>
                        </div>
                    </div>
                </div>
                <!-- Email (Read-only styled) -->
                <div class="flex flex-col gap-2">
                    <label class="text-sm font-semibold text-slate-700 dark:text-slate-300">Email</label>
                    <input type="email" value="nguyenvana@gmail.com" disabled="" class="w-full px-4 py-3 rounded-xl border border-primary/5 bg-slate-50 dark:bg-slate-800/50 text-slate-400 cursor-not-allowed">
                    <p class="text-[11px] text-slate-400 italic">Vui lòng liên hệ bộ phận chăm sóc khách hàng nếu bạn muốn thay đổi email.</p>
                </div>
                
                <div class="pt-6 border-t border-primary/5">
                    <button type="submit" class="w-full md:w-auto px-10 py-3.5 bg-primary text-white font-bold rounded-xl shadow-lg shadow-primary/20 hover:bg-primary/90 hover:-translate-y-0.5 transition-all duration-200">
                        Lưu thay đổi
                    </button>
                </div>
            </form>
            
            <!-- Secondary info card -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mt-8">
                <!-- Points card removed by user request -->
                <div class="bg-surface dark:bg-slate-900 p-4 rounded-xl border border-primary/5 flex items-center gap-4">
                    <div class="w-10 h-10 rounded-full bg-primary/10 flex items-center justify-center text-primary">
                        <span class="material-symbols-outlined">receipt_long</span>
                    </div>
                    <div>
                        <p class="text-xs text-slate-500">Tổng đơn hàng</p>
                        <p class="font-bold">12 đơn</p>
                    </div>
                </div>
                <div class="bg-surface dark:bg-slate-900 p-4 rounded-xl border border-primary/5 flex items-center gap-4">
                    <div class="w-10 h-10 rounded-full bg-primary/10 flex items-center justify-center text-primary">
                        <span class="material-symbols-outlined">workspace_premium</span>
                    </div>
                    <div>
                        <p class="text-xs text-slate-500">Ngày tham gia</p>
                        <p class="font-bold">12/05/2023</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
