<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" th:fragment="layout(title, activePage, content)">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">Trà Thơm - Hồ sơ thành viên</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2d5a27",
                        "accent": "#ec5b13",
                        "background-light": "#f2f7f2",
                        "background-dark": "#1a2419",
                        "surface": "#ffffff",
                    },
                    fontFamily: {
                        "display": ["Public Sans", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
    <style>
        body { font-family: 'Public Sans', sans-serif; }
        .sidebar-active { background-color: rgba(45, 90, 39, 0.1); color: #2d5a27; border-right: 3px solid #2d5a27; }
        /* Hide edge/chrome native password reveal across profile pages */
        input::-ms-reveal, input::-ms-clear { display: none !important; width: 0 !important; height: 0 !important; }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen">
    
    <!-- Header -->
    <div th:replace="~{fragments/main-header :: header}"></div>
    
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 pt-40 pb-20">
        
        <!-- Profile Header Area -->
        <div class="bg-surface dark:bg-slate-900 rounded-xl p-6 mb-8 shadow-sm border border-primary/5">
            <div class="flex flex-col md:flex-row items-center justify-between gap-6">
                <div class="flex flex-col md:flex-row items-center gap-6">
                    <div class="relative">
                        <div class="w-24 h-24 rounded-full border-4 border-primary/10 overflow-hidden" data-alt="Large circular user profile picture">
                            <img src="https://lh3.googleusercontent.com/aida-public/AB6AXuD5wfm2AsGWkOlWEhC9Ivc-JniAufQfS69cM0bPLpDbPnBJAgcmkyVMpTWfnQiqxu5LMZSjCTIo12NKHiIXQlXm0fvQR5j4wSYAyZV5EyivzKXq8nzcvNtSDRBqEo6Pk-j39w6FSJ6o2SqqU6nrMyWBCwBx3VkCul69My0PHHAWsMIp0qRWtqJnfRUBsHMTblbg3PP02lITIJRT0a5Im_KF3KqJvEVBl3_4E1mI0axElsneOcZtu841MHwvu9YSCHEfo2GSbxaqgJ4" alt="Avatar" class="w-full h-full object-cover">
                        </div>
                        <button class="absolute bottom-0 right-0 bg-primary text-white p-1.5 rounded-full shadow-lg border-2 border-white">
                            <span class="material-symbols-outlined text-sm">photo_camera</span>
                        </button>
                    </div>
                    <div class="text-center md:text-left">
                        <h1 class="text-2xl font-bold text-slate-900 dark:text-white">Nguyễn Văn A</h1>
                        <p class="text-slate-500 dark:text-slate-400">nguyenvana@gmail.com</p>
                        <!-- Rank removed by user request -->
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Main Layout: Sidebar + Content -->
        <div class="flex flex-col lg:flex-row gap-8">
            <!-- Sidebar -->
            <div th:replace="~{fragments/profile-sidebar :: sidebar(activePage=${activePage})}"></div>
            
            <!-- Page Content Area -->
            <section class="w-full lg:w-3/4">
                <div th:replace="${content}"></div>
            </section>
        </div>
        
    </main>
    
    <!-- Footer -->
    <div th:replace="~{fragments/profile-footer :: footer}"></div>
    
</body>
</html>
